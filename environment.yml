name: branko
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.11
  - biopython
  - ipykernel
  - pip
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1
  - mmseqs2
  - seqkit
  - yq
  - numpy<2
  - networkx
  - pyyaml
  - requests
  - pillow
  - jinja2
  - tqdm
  - psutil
  - viennarna
  - openblas
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - hmmer
  - pip:
      - lightning==2.5.6
      - pytorch-lightning==2.5.5
      - torchmetrics==1.8.2
      - wandb==0.22.3
      - pyfaidx==0.9.0.3
      - einops==0.8.1
      - ml-collections==1.1.0
      # - flash-attn==2.7.3
